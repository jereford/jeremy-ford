  <script>
    // Show the case study nav after the user scrolls 200px
    (function () {
      var nav = document.getElementById('floating-toc');
      if (!nav) return;

      function onScroll() {
        if (window.scrollY > 200) {
          nav.classList.add('is-visible');
        } else {
          nav.classList.remove('is-visible');
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });
